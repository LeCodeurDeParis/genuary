<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 05 - Art isométrique</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
    </style>
</head>
<body>
    <script>
        const TILE_W = 40;
        const TILE_H = 20;
        
        function setup() {
            createCanvas(800, 800);
            background(26, 26, 46);
            
            translate(width/2, 150);
            
            // Grille isométrique de cubes
            for (let y = 0; y < 12; y++) {
                for (let x = 0; x < 12; x++) {
                    let isoX = (x - y) * TILE_W;
                    let isoY = (x + y) * TILE_H;
                    let h = noise(x * 0.2, y * 0.2) * 100 + 20;
                    
                    drawIsoCube(isoX, isoY, TILE_W * 2, h);
                }
            }
        }
        
        function drawIsoCube(x, y, w, h) {
            // Face du haut
            fill(180, 120, 200);
            beginShape();
            vertex(x, y);
            vertex(x + w/2, y + TILE_H);
            vertex(x, y + TILE_H * 2);
            vertex(x - w/2, y + TILE_H);
            endShape(CLOSE);
            
            // Face gauche
            fill(120, 80, 150);
            beginShape();
            vertex(x - w/2, y + TILE_H);
            vertex(x, y + TILE_H * 2);
            vertex(x, y + TILE_H * 2 + h);
            vertex(x - w/2, y + TILE_H + h);
            endShape(CLOSE);
            
            // Face droite
            fill(160, 100, 180);
            beginShape();
            vertex(x, y + TILE_H * 2);
            vertex(x + w/2, y + TILE_H);
            vertex(x + w/2, y + TILE_H + h);
            vertex(x, y + TILE_H * 2 + h);
            endShape(CLOSE);
            
            // Contours
            stroke(80, 50, 100);
            strokeWeight(1);
            noFill();
            beginShape();
            vertex(x, y);
            vertex(x + w/2, y + TILE_H);
            vertex(x, y + TILE_H * 2);
            vertex(x - w/2, y + TILE_H);
            endShape(CLOSE);
        }
        
        function mousePressed() {
            noiseSeed(random(10000));
            setup();
        }
    </script>
</body>
</html>
