<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 12 - Subdivision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f0; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            background(245, 245, 240);
            strokeWeight(2);
            
            subdivide(0, 0, width, height, 0);
        }
        
        function subdivide(x, y, w, h, depth) {
            // Conditions d'arrêt
            if (depth > 6 || w < 20 || h < 20) {
                // Dessiner le rectangle avec une couleur
                let hue = map(depth, 0, 6, 0, 360);
                colorMode(HSB);
                fill(hue, random(30, 70), random(60, 95));
                colorMode(RGB);
                
                stroke(40, 40, 35);
                rect(x, y, w, h);
                
                // Ajouter des détails
                if (random() < 0.3) {
                    noStroke();
                    fill(0, random(20, 60));
                    circle(x + w/2, y + h/2, min(w, h) * 0.5);
                }
                
                return;
            }
            
            // Choisir le type de subdivision
            let choice = random();
            
            if (choice < 0.33 && w > 40) {
                // Subdivision verticale
                let split = random(0.3, 0.7);
                let splitX = x + w * split;
                subdivide(x, y, w * split, h, depth + 1);
                subdivide(splitX, y, w * (1 - split), h, depth + 1);
            } else if (choice < 0.66 && h > 40) {
                // Subdivision horizontale
                let split = random(0.3, 0.7);
                let splitY = y + h * split;
                subdivide(x, y, w, h * split, depth + 1);
                subdivide(x, splitY, w, h * (1 - split), depth + 1);
            } else if (w > 40 && h > 40) {
                // Subdivision en quatre
                let splitX = random(0.3, 0.7);
                let splitY = random(0.3, 0.7);
                subdivide(x, y, w * splitX, h * splitY, depth + 1);
                subdivide(x + w * splitX, y, w * (1 - splitX), h * splitY, depth + 1);
                subdivide(x, y + h * splitY, w * splitX, h * (1 - splitY), depth + 1);
                subdivide(x + w * splitX, y + h * splitY, w * (1 - splitX), h * (1 - splitY), depth + 1);
            } else {
                // Dessiner si aucune subdivision n'est possible
                let hue = map(depth, 0, 6, 0, 360);
                colorMode(HSB);
                fill(hue, random(30, 70), random(60, 95));
                colorMode(RGB);
                stroke(40, 40, 35);
                rect(x, y, w, h);
            }
        }
        
        function mousePressed() {
            setup();
        }
    </script>
</body>
</html>
