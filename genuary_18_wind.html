<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 18 - À quoi ressemble le vent?</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e8f4f8; }
    </style>
</head>
<body>
    <script>
        let particles = [];
        let flowField = [];
        let cols, rows;
        let scale = 20;
        let zoff = 0;
        
        function setup() {
            createCanvas(800, 800);
            cols = floor(width / scale);
            rows = floor(height / scale);
            
            // Créer des particules pour visualiser le vent
            for (let i = 0; i < 1000; i++) {
                particles.push(new Particle());
            }
        }
        
        function draw() {
            background(232, 244, 248, 25);
            
            // Calculer le champ de flux (vent)
            let yoff = 0;
            for (let y = 0; y < rows; y++) {
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    let index = x + y * cols;
                    let angle = noise(xoff, yoff, zoff) * TWO_PI * 2;
                    let v = p5.Vector.fromAngle(angle);
                    v.setMag(0.5);
                    flowField[index] = v;
                    xoff += 0.1;
                }
                yoff += 0.1;
            }
            zoff += 0.005;
            
            // Dessiner et mettre à jour les particules
            for (let particle of particles) {
                particle.follow(flowField);
                particle.update();
                particle.edges();
                particle.show();
            }
            
            // Ajouter des rafales occasionnelles
            if (frameCount % 60 === 0) {
                for (let i = 0; i < 50; i++) {
                    particles.push(new Particle(random(width), height/2));
                }
            }
        }
        
        class Particle {
            constructor(x, y) {
                this.pos = createVector(x || random(width), y || random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = 3;
                this.prevPos = this.pos.copy();
                this.alpha = 255;
            }
            
            follow(vectors) {
                let x = floor(this.pos.x / scale);
                let y = floor(this.pos.y / scale);
                let index = x + y * cols;
                let force = vectors[index];
                if (force) {
                    this.applyForce(force);
                }
            }
            
            applyForce(force) {
                this.acc.add(force);
            }
            
            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.alpha -= 2;
            }
            
            edges() {
                if (this.pos.x > width) {
                    this.pos.x = 0;
                    this.updatePrev();
                }
                if (this.pos.x < 0) {
                    this.pos.x = width;
                    this.updatePrev();
                }
                if (this.pos.y > height) {
                    this.pos.y = 0;
                    this.updatePrev();
                }
                if (this.pos.y < 0) {
                    this.pos.y = height;
                    this.updatePrev();
                }
            }
            
            updatePrev() {
                this.prevPos.x = this.pos.x;
                this.prevPos.y = this.pos.y;
            }
            
            show() {
                stroke(100, 150, 200, this.alpha);
                strokeWeight(1);
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                this.updatePrev();
                
                // Supprimer si invisible
                if (this.alpha <= 0) {
                    let index = particles.indexOf(this);
                    particles.splice(index, 1);
                    particles.push(new Particle());
                }
            }
        }
        
        function mousePressed() {
            particles = [];
            for (let i = 0; i < 1000; i++) {
                particles.push(new Particle());
            }
        }
    </script>
</body>
</html>
