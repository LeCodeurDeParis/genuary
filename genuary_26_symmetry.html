<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 26 - Symétrie</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
    </style>
</head>
<body>
    <script>
        let symmetryMode = 8; // Nombre d'axes de symétrie
        let angle = 0;
        
        function setup() {
            createCanvas(800, 800);
            colorMode(HSB);
            background(26, 26, 46);
        }
        
        function draw() {
            background(26, 26, 46, 0.05);
            
            translate(width / 2, height / 2);
            
            // Dessiner avec symétrie radiale
            for (let i = 0; i < symmetryMode; i++) {
                push();
                rotate(TWO_PI / symmetryMode * i);
                
                // Motif 1: Formes organiques
                drawSymmetricShape(angle);
                
                // Motif 2: Lignes
                stroke(map(i, 0, symmetryMode, 200, 300), 70, 80);
                strokeWeight(2);
                let r1 = 100 + sin(angle) * 50;
                let r2 = 200 + cos(angle * 1.5) * 30;
                line(r1, 0, r2, sin(angle * 3) * 20);
                
                // Symétrie miroir en plus
                push();
                scale(1, -1);
                drawSymmetricShape(angle);
                stroke(map(i, 0, symmetryMode, 200, 300), 70, 80);
                strokeWeight(2);
                line(r1, 0, r2, sin(angle * 3) * 20);
                pop();
                
                pop();
            }
            
            // Cercles concentriques symétriques
            noFill();
            for (let r = 50; r < 350; r += 30) {
                stroke(map(r, 50, 350, 260, 320), 60, 70);
                strokeWeight(1);
                circle(0, 0, r * 2);
            }
            
            // Motif central
            push();
            rotate(angle);
            for (let i = 0; i < 12; i++) {
                let a = TWO_PI / 12 * i;
                let x = cos(a) * 50;
                let y = sin(a) * 50;
                
                fill(map(i, 0, 12, 180, 280), 80, 80);
                noStroke();
                circle(x, y, 15 + sin(angle * 2) * 5);
            }
            pop();
            
            angle += 0.01;
        }
        
        function drawSymmetricShape(t) {
            // Forme organique symétrique
            noStroke();
            fill(220 + sin(t) * 40, 70, 70, 0.6);
            
            beginShape();
            for (let a = 0; a < TWO_PI; a += 0.2) {
                let r = 150 + sin(a * 3 + t) * 30 + cos(a * 5) * 20;
                let x = cos(a) * r;
                let y = sin(a) * r;
                vertex(x, y);
            }
            endShape(CLOSE);
            
            // Détails internes
            fill(240 + cos(t) * 40, 80, 90, 0.4);
            beginShape();
            for (let a = 0; a < TWO_PI; a += 0.3) {
                let r = 120 + cos(a * 4 - t) * 20;
                let x = cos(a) * r;
                let y = sin(a) * r;
                vertex(x, y);
            }
            endShape(CLOSE);
        }
        
        function mousePressed() {
            symmetryMode = int(random(4, 16));
            background(26, 26, 46);
        }
        
        function keyPressed() {
            if (key === ' ') {
                background(26, 26, 46);
            }
        }
    </script>
</body>
</html>
