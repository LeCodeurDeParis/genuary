<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 20 - Architecture générative</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #87CEEB; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            noLoop();
            drawArchitecture();
        }
        
        function drawArchitecture() {
            // Ciel dégradé
            for (let y = 0; y < height * 0.7; y++) {
                let c = lerpColor(color(135, 206, 235), color(200, 220, 240), y / (height * 0.7));
                stroke(c);
                line(0, y, width, y);
            }
            
            // Sol
            fill(100, 100, 100);
            noStroke();
            rect(0, height * 0.7, width, height * 0.3);
            
            // Génération de bâtiments
            let x = 50;
            while (x < width - 50) {
                let buildingWidth = random(60, 150);
                let buildingHeight = random(200, 500);
                drawBuilding(x, height * 0.7, buildingWidth, buildingHeight);
                x += buildingWidth + random(10, 30);
            }
        }
        
        function drawBuilding(x, groundLevel, w, h) {
            push();
            
            // Couleur du bâtiment
            let buildingColors = [
                color(180, 180, 180),
                color(200, 200, 210),
                color(160, 170, 180),
                color(190, 185, 175)
            ];
            let mainColor = random(buildingColors);
            
            // Corps principal
            fill(mainColor);
            stroke(100, 100, 120);
            strokeWeight(2);
            rect(x, groundLevel - h, w, h);
            
            // Fenêtres
            let windowColor = random() < 0.7 ? color(100, 150, 200, 150) : color(255, 220, 100, 200);
            fill(windowColor);
            noStroke();
            
            let rows = floor(h / 30);
            let cols = floor(w / 25);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    if (random() < 0.85) { // Quelques fenêtres éteintes
                        let wx = x + 10 + col * 25;
                        let wy = groundLevel - h + 10 + row * 30;
                        rect(wx, wy, 15, 20);
                    }
                }
            }
            
            // Détails architecturaux
            if (random() < 0.4) {
                // Toit en pente
                fill(red(mainColor) * 0.7, green(mainColor) * 0.7, blue(mainColor) * 0.7);
                stroke(100, 100, 120);
                strokeWeight(2);
                triangle(x - 10, groundLevel - h, x + w/2, groundLevel - h - 40, x + w + 10, groundLevel - h);
            } else if (random() < 0.5) {
                // Toit plat avec détails
                fill(red(mainColor) * 0.8, green(mainColor) * 0.8, blue(mainColor) * 0.8);
                rect(x - 5, groundLevel - h - 20, w + 10, 20);
            }
            
            // Porte d'entrée
            fill(80, 60, 40);
            rect(x + w/2 - 15, groundLevel - 50, 30, 50);
            
            // Balcons occasionnels
            if (random() < 0.3) {
                for (let i = 0; i < 3; i++) {
                    let by = groundLevel - h + 50 + i * 100;
                    fill(red(mainColor) * 0.9, green(mainColor) * 0.9, blue(mainColor) * 0.9);
                    stroke(100);
                    strokeWeight(1);
                    rect(x + w - 5, by, 8, 40);
                    line(x + w - 5, by, x + w - 5, by + 40);
                }
            }
            
            pop();
        }
        
        function mousePressed() {
            drawArchitecture();
        }
    </script>
</body>
</html>
