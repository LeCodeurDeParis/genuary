<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 15 - Concevoir un tapis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #3a3a3a; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            noLoop();
            drawRug();
        }
        
        function drawRug() {
            background(58, 58, 58);
            
            // Couleurs du tapis persan
            let burgundy = color(120, 30, 40);
            let gold = color(200, 160, 60);
            let navy = color(20, 40, 80);
            let cream = color(240, 230, 210);
            let rust = color(180, 80, 40);
            
            // Bordure extérieure
            fill(navy);
            rect(50, 50, 700, 700);
            
            // Bordure décorative
            fill(gold);
            rect(70, 70, 660, 660);
            
            // Fond principal
            fill(burgundy);
            rect(90, 90, 620, 620);
            
            // Motif central - médaillon
            push();
            translate(width/2, height/2);
            
            // Grand médaillon central
            fill(navy);
            ellipse(0, 0, 350, 450);
            
            fill(cream);
            ellipse(0, 0, 320, 420);
            
            fill(rust);
            ellipse(0, 0, 280, 380);
            
            // Motifs internes du médaillon
            fill(gold);
            for (let a = 0; a < TWO_PI; a += TWO_PI/8) {
                push();
                rotate(a);
                ellipse(0, -140, 60, 40);
                ellipse(0, 140, 60, 40);
                pop();
            }
            
            // Centre du médaillon
            fill(navy);
            star(0, 0, 40, 80, 8);
            
            pop();
            
            // Motifs des coins
            drawCornerMotif(150, 150, burgundy, gold, cream);
            drawCornerMotif(width - 150, 150, burgundy, gold, cream);
            drawCornerMotif(150, height - 150, burgundy, gold, cream);
            drawCornerMotif(width - 150, height - 150, burgundy, gold, cream);
            
            // Bordure intérieure avec motifs répétés
            for (let i = 0; i < 20; i++) {
                let x = map(i, 0, 19, 100, width - 100);
                drawSmallFlower(x, 100, gold, navy);
                drawSmallFlower(x, height - 100, gold, navy);
                
                let y = map(i, 0, 19, 100, height - 100);
                drawSmallFlower(100, y, gold, navy);
                drawSmallFlower(width - 100, y, gold, navy);
            }
            
            // Texture de tapis (franges)
            stroke(burgundy);
            strokeWeight(2);
            for (let x = 50; x < 750; x += 5) {
                line(x, 45, x, 55);
                line(x, 745, x, 755);
            }
        }
        
        function drawCornerMotif(x, y, c1, c2, c3) {
            push();
            translate(x, y);
            
            fill(c2);
            circle(0, 0, 80);
            
            fill(c3);
            circle(0, 0, 60);
            
            fill(c1);
            for (let a = 0; a < TWO_PI; a += TWO_PI/6) {
                let px = cos(a) * 25;
                let py = sin(a) * 25;
                circle(px, py, 15);
            }
            
            pop();
        }
        
        function drawSmallFlower(x, y, c1, c2) {
            push();
            translate(x, y);
            
            fill(c1);
            circle(0, 0, 12);
            
            fill(c2);
            circle(0, 0, 6);
            
            pop();
        }
        
        function star(x, y, radius1, radius2, npoints) {
            let angle = TWO_PI / npoints;
            let halfAngle = angle / 2.0;
            beginShape();
            for (let a = 0; a < TWO_PI; a += angle) {
                let sx = x + cos(a) * radius2;
                let sy = y + sin(a) * radius2;
                vertex(sx, sy);
                sx = x + cos(a + halfAngle) * radius1;
                sy = y + sin(a + halfAngle) * radius1;
                vertex(sx, sy);
            }
            endShape(CLOSE);
        }
        
        function mousePressed() {
            drawRug();
        }
    </script>
</body>
</html>
