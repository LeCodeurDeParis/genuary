<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 09 - Motifs de sièges de transport</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #2a2a2a; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            noLoop();
            drawPattern();
        }
        
        function drawPattern() {
            background(40, 35, 60);
            
            let tileSize = 80;
            
            // Motif inspiré des sièges de métro/bus
            for (let x = 0; x < width; x += tileSize) {
                for (let y = 0; y < height; y += tileSize) {
                    push();
                    translate(x + tileSize/2, y + tileSize/2);
                    
                    // Couleurs typiques des transports
                    let colors = [
                        color(180, 60, 80),   // Rose/magenta
                        color(80, 120, 180),  // Bleu
                        color(220, 180, 100), // Jaune/or
                        color(100, 160, 140), // Vert/turquoise
                        color(150, 80, 120)   // Violet
                    ];
                    
                    let c = random(colors);
                    
                    // Motif géométrique
                    fill(c);
                    noStroke();
                    circle(0, 0, 50);
                    
                    fill(red(c) * 0.7, green(c) * 0.7, blue(c) * 0.7);
                    rect(-30, -5, 60, 10);
                    rect(-5, -30, 10, 60);
                    
                    // Petits détails
                    fill(255, 255, 200);
                    circle(-15, -15, 8);
                    circle(15, -15, 8);
                    circle(-15, 15, 8);
                    circle(15, 15, 8);
                    
                    // Lignes diagonales typiques
                    stroke(red(c) * 1.2, green(c) * 1.2, blue(c) * 1.2);
                    strokeWeight(2);
                    for (let i = -30; i < 30; i += 10) {
                        line(i, -30, i + 30, 0);
                        line(i, 0, i + 30, 30);
                    }
                    
                    pop();
                }
            }
            
            // Texture d'usure
            for (let i = 0; i < 1000; i++) {
                stroke(255, 255, 200, random(5, 30));
                strokeWeight(random(1, 3));
                point(random(width), random(height));
            }
        }
        
        function mousePressed() {
            drawPattern();
        }
    </script>
</body>
</html>
