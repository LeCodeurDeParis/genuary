<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 01 - Lignes verticales ou horizontales</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a1a; }
        main { text-align: center; }
    </style>
</head>
<body>
    <main></main>
    <script>
        function setup() {
            createCanvas(800, 800);
            background(20);
            strokeCap(SQUARE);
            
            // Lignes verticales avec variations
            for (let x = 0; x < width; x += 15) {
                let weight = random(1, 8);
                let alpha = random(50, 255);
                stroke(random(200, 255), random(100, 200), random(50, 150), alpha);
                strokeWeight(weight);
                let y1 = random(0, height * 0.3);
                let y2 = random(height * 0.7, height);
                line(x, y1, x, y2);
            }
            
            // Lignes horizontales superposées
            for (let y = 0; y < height; y += 20) {
                let weight = random(0.5, 4);
                let alpha = random(30, 180);
                stroke(random(100, 255), random(150, 255), random(200, 255), alpha);
                strokeWeight(weight);
                let x1 = random(0, width * 0.2);
                let x2 = random(width * 0.8, width);
                line(x1, y, x2, y);
            }
        }
        
        function draw() {
            // Statique
        }
        
        function mousePressed() {
            setup();
        }
    </script>
</body>
</html>
