<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 31 - Tri des pixels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
    </style>
</head>
<body>
    <script>
        let img;
        let sortMode = 'brightness';
        
        function setup() {
            createCanvas(800, 800);
            
            // Créer une image de base avec des formes colorées
            img = createGraphics(800, 800);
            generateBaseImage();
            
            image(img, 0, 0);
        }
        
        function generateBaseImage() {
            img.background(0);
            img.colorMode(HSB);
            
            // Créer un motif coloré intéressant
            for (let i = 0; i < 20; i++) {
                img.fill(random(360), random(60, 100), random(60, 100));
                img.noStroke();
                img.circle(random(width), random(height), random(50, 200));
            }
            
            // Ajouter des formes géométriques
            for (let i = 0; i < 10; i++) {
                img.fill(random(360), 80, 80);
                img.rect(random(width), random(height), random(100, 300), random(50, 150));
            }
            
            // Gradients
            for (let x = 0; x < width; x += 50) {
                img.stroke(map(x, 0, width, 0, 360), 70, 70, 100);
                img.strokeWeight(30);
                img.line(x, 0, x, height);
            }
        }
        
        function draw() {
            // Ne rien faire en draw, tout se passe au clic
        }
        
        function mousePressed() {
            pixelSort();
        }
        
        function keyPressed() {
            if (key === '1') {
                sortMode = 'brightness';
                pixelSort();
            } else if (key === '2') {
                sortMode = 'hue';
                pixelSort();
            } else if (key === '3') {
                sortMode = 'saturation';
                pixelSort();
            } else if (key === 'r' || key === 'R') {
                generateBaseImage();
                image(img, 0, 0);
            }
        }
        
        function pixelSort() {
            loadPixels();
            
            if (random() < 0.5) {
                // Tri horizontal
                for (let y = 0; y < height; y++) {
                    // Trouver les segments à trier
                    let segments = [];
                    let start = 0;
                    
                    for (let x = 0; x < width; x++) {
                        let index = (x + y * width) * 4;
                        let bright = (pixels[index] + pixels[index + 1] + pixels[index + 2]) / 3;
                        
                        // Démarrer un nouveau segment si pixel sombre
                        if (bright < 40) {
                            if (x - start > 10) {
                                segments.push({ start: start, end: x, y: y });
                            }
                            start = x + 1;
                        }
                    }
                    
                    // Dernier segment
                    if (width - start > 10) {
                        segments.push({ start: start, end: width, y: y });
                    }
                    
                    // Trier chaque segment
                    for (let seg of segments) {
                        sortSegmentHorizontal(seg.start, seg.end, seg.y);
                    }
                }
            } else {
                // Tri vertical
                for (let x = 0; x < width; x++) {
                    let segments = [];
                    let start = 0;
                    
                    for (let y = 0; y < height; y++) {
                        let index = (x + y * width) * 4;
                        let bright = (pixels[index] + pixels[index + 1] + pixels[index + 2]) / 3;
                        
                        if (bright < 40) {
                            if (y - start > 10) {
                                segments.push({ start: start, end: y, x: x });
                            }
                            start = y + 1;
                        }
                    }
                    
                    if (height - start > 10) {
                        segments.push({ start: start, end: height, x: x });
                    }
                    
                    for (let seg of segments) {
                        sortSegmentVertical(seg.x, seg.start, seg.end);
                    }
                }
            }
            
            updatePixels();
            
            // Afficher le mode
            fill(255);
            noStroke();
            textSize(16);
            text(`Mode: ${sortMode} | Touches 1-3: changer mode | R: reset | Clic: trier`, 10, 30);
        }
        
        function sortSegmentHorizontal(startX, endX, y) {
            let pixelData = [];
            
            // Extraire les pixels du segment
            for (let x = startX; x < endX; x++) {
                let index = (x + y * width) * 4;
                let r = pixels[index];
                let g = pixels[index + 1];
                let b = pixels[index + 2];
                let a = pixels[index + 3];
                
                let sortValue;
                if (sortMode === 'brightness') {
                    sortValue = (r + g + b) / 3;
                } else if (sortMode === 'hue') {
                    sortValue = hue(color(r, g, b));
                } else {
                    sortValue = saturation(color(r, g, b));
                }
                
                pixelData.push({ r, g, b, a, sortValue });
            }
            
            // Trier
            pixelData.sort((a, b) => a.sortValue - b.sortValue);
            
            // Remettre les pixels
            for (let i = 0; i < pixelData.length; i++) {
                let index = ((startX + i) + y * width) * 4;
                pixels[index] = pixelData[i].r;
                pixels[index + 1] = pixelData[i].g;
                pixels[index + 2] = pixelData[i].b;
                pixels[index + 3] = pixelData[i].a;
            }
        }
        
        function sortSegmentVertical(x, startY, endY) {
            let pixelData = [];
            
            for (let y = startY; y < endY; y++) {
                let index = (x + y * width) * 4;
                let r = pixels[index];
                let g = pixels[index + 1];
                let b = pixels[index + 2];
                let a = pixels[index + 3];
                
                let sortValue;
                if (sortMode === 'brightness') {
                    sortValue = (r + g + b) / 3;
                } else if (sortMode === 'hue') {
                    sortValue = hue(color(r, g, b));
                } else {
                    sortValue = saturation(color(r, g, b));
                }
                
                pixelData.push({ r, g, b, a, sortValue });
            }
            
            pixelData.sort((a, b) => a.sortValue - b.sortValue);
            
            for (let i = 0; i < pixelData.length; i++) {
                let index = (x + (startY + i) * width) * 4;
                pixels[index] = pixelData[i].r;
                pixels[index + 1] = pixelData[i].g;
                pixels[index + 2] = pixelData[i].b;
                pixels[index + 3] = pixelData[i].a;
            }
        }
    </script>
</body>
</html>
