<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 22 - Dégradés uniquement</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            noLoop();
            drawGradients();
        }
        
        function drawGradients() {
            background(0);
            
            // Dégradé radial central
            drawRadialGradient(
                width/2, height/2, 400,
                color(255, 100, 150),
                color(100, 50, 200)
            );
            
            // Dégradés circulaires superposés
            for (let i = 0; i < 8; i++) {
                let angle = map(i, 0, 8, 0, TWO_PI);
                let x = width/2 + cos(angle) * 200;
                let y = height/2 + sin(angle) * 200;
                
                drawRadialGradient(
                    x, y, 150,
                    color(random(100, 255), random(100, 255), random(100, 255), 150),
                    color(random(50, 150), random(50, 150), random(50, 150), 0)
                );
            }
            
            // Dégradés linéaires en bandes
            for (let i = 0; i < 10; i++) {
                let y = i * 80;
                drawLinearGradient(
                    0, y, width, 80,
                    color(random(100, 255), random(100, 200), random(150, 255), 100),
                    color(random(50, 150), random(150, 255), random(100, 200), 100)
                );
            }
            
            // Dégradés angulaires
            push();
            translate(width/2, height/2);
            for (let a = 0; a < TWO_PI; a += TWO_PI / 12) {
                let c1 = color(200, 100, 255, 100);
                let c2 = color(100, 200, 255, 100);
                drawAngularGradientSegment(0, 0, 300, a, a + TWO_PI/12, c1, c2);
            }
            pop();
        }
        
        function drawRadialGradient(x, y, radius, c1, c2) {
            noStroke();
            for (let r = radius; r > 0; r -= 2) {
                let inter = map(r, 0, radius, 0, 1);
                let c = lerpColor(c2, c1, inter);
                fill(c);
                circle(x, y, r * 2);
            }
        }
        
        function drawLinearGradient(x, y, w, h, c1, c2) {
            noStroke();
            for (let i = 0; i <= w; i++) {
                let inter = map(i, 0, w, 0, 1);
                let c = lerpColor(c1, c2, inter);
                stroke(c);
                line(x + i, y, x + i, y + h);
            }
        }
        
        function drawAngularGradientSegment(x, y, radius, startAngle, endAngle, c1, c2) {
            let steps = 50;
            noStroke();
            for (let i = 0; i < steps; i++) {
                let angle = map(i, 0, steps, startAngle, endAngle);
                let nextAngle = map(i + 1, 0, steps, startAngle, endAngle);
                let inter = map(i, 0, steps, 0, 1);
                let c = lerpColor(c1, c2, inter);
                fill(c);
                
                beginShape();
                vertex(x, y);
                vertex(x + cos(angle) * radius, y + sin(angle) * radius);
                vertex(x + cos(nextAngle) * radius, y + sin(nextAngle) * radius);
                endShape(CLOSE);
            }
        }
        
        function mousePressed() {
            drawGradients();
        }
    </script>
</body>
</html>
