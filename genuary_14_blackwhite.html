<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuary 14 - Noir et blanc pur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(800, 800);
            noLoop();
            drawPattern();
        }
        
        function drawPattern() {
            background(255);
            noStroke();
            
            // Dithering pattern avec cercles
            let spacing = 20;
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    let d = dist(x, y, width/2, height/2);
                    let threshold = map(d, 0, width/2, 0.9, 0.1);
                    
                    if (random() < threshold) {
                        fill(0);
                        circle(x, y, spacing * 0.8);
                    }
                }
            }
            
            // Motif de cercles concentriques
            stroke(0);
            strokeWeight(2);
            noFill();
            for (let r = 50; r < 400; r += 15) {
                if (r % 30 < 15) {
                    circle(width/2, height/2, r * 2);
                }
            }
            
            // Lignes radiales
            push();
            translate(width/2, height/2);
            for (let a = 0; a < TWO_PI; a += PI/16) {
                if (sin(a * 8) > 0) {
                    stroke(0);
                    strokeWeight(3);
                    line(0, 0, cos(a) * 350, sin(a) * 350);
                }
            }
            pop();
            
            // Rectangles en damier
            noStroke();
            let rectSize = 40;
            for (let x = 0; x < width; x += rectSize * 2) {
                for (let y = 0; y < height; y += rectSize * 2) {
                    // Pattern checkerboard dans les coins
                    if ((x < 150 || x > width - 150) && (y < 150 || y > height - 150)) {
                        fill(0);
                        rect(x, y, rectSize, rectSize);
                        rect(x + rectSize, y + rectSize, rectSize, rectSize);
                    }
                }
            }
            
            // Triangles
            fill(0);
            for (let i = 0; i < 30; i++) {
                let x = random(width);
                let y = random(height);
                let size = random(10, 40);
                
                // Ne dessiner que si loin du centre
                if (dist(x, y, width/2, height/2) > 200) {
                    triangle(
                        x, y - size,
                        x - size * 0.866, y + size * 0.5,
                        x + size * 0.866, y + size * 0.5
                    );
                }
            }
        }
        
        function mousePressed() {
            drawPattern();
        }
    </script>
</body>
</html>
